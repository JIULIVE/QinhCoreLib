# QinhCoreLib 配置文件
# 秦淮系列插件核心库

# 语言 / Language
#   插件文本读取 lang/<language>/*.yml；缺失的条目自动回退英文 en_US。
#   The plugin reads text from lang/<language>/*.yml; missing entries fall back to en_US.
#   内置 built-in: zh_cn (简体中文) / en_US (English) / zh_tw (繁體中文) / ru_RU / fr_FR / vi_VN / es_ES
language: zh_cn

database:
  # 数据库类型: sqlite 或 mysql
  type: sqlite
  
  # SQLite配置
  sqlite:
    # 数据文件夹路径 (相对于插件目录)
    data-folder: data
  
  # MySQL配置 (可选)
  mysql:
    host: localhost
    port: 3306
    database: qinhcorelib
    username: root
    password: ""

debug:
  # 是否启用调试模式
  enabled: false
  # 调试日志前缀
  prefix: "[QinhCoreLib-Debug]"

# 经济桥接（Vault / ExcellentEconomy / PlayerPoints）
economy:
  # auto: 有 currency 时优先 ExcellentEconomy，否则 Vault，再 PlayerPoints
  # vault | excellenteconomy | ee | playerpoints | pp
  default-provider: auto
  # ExcellentEconomy 默认货币（铜钱 money / 银票 silver / 金契 gold 等，与 EE 配置 id 一致）
  default-currency: money
#
# GUI click-actions 经济动作（value 格式，| 后为失败提示）：
#   give_money / take_money / set_money
#   100 | 100:money | excellenteconomy:gold:50 | vault:100 | playerpoints:10

# JavaScript（GraalJS，供 QinhItems / QCR / QinhSkills 等共用）
# 脚本路径：命名空间:相对路径.js[:函数名]  例 qinhitems:hooks/craft.js:check
# GUI 条件 type=javascript  动作 type=javascript / run_script
javascript:
  enabled: true
  default-function: main
  debug:
    print-stacktrace: false

# 属性系统（QCL 原生属性后端，不装 AP/SX 也能用全套属性与伤害）
# 全生态（QI/QSt/QF/QS/QC）统一从这里读后端选择，无需各插件各配。
attribute:
  # 后端选择：
  #   native        ——（默认）QCL 自带原生属性后端，无需任何属性插件
  #   attributeplus —— 改用 AttributePlus 接管属性（需装 AP，由 QinhItems 注册）
  #   auto          —— 有可用的第三方属性后端则优先用它，否则回退 native
  backend: native

# 模块配置 (可以禁用不需要的模块)
modules:
  config: true
  database: true
  reflection: true
  modelengine: true
  customcrops: true
  craftengine: true
  mythicmobs: true
  neigeitems: true
  mmoitems: true
  gui: true
  action: true
  pdc: true
  item: true
  hologram: true
  scheduler: true
  condition: true
  expression: true
  script: true
  economy: true
  customblock: true
  assembly: true
