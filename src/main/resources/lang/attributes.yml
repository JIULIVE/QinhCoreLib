# ============================================================
# QinhCoreLib 属性显示 · lang/attributes.yml （跨语言基准层 / shared base layer）
# ============================================================
# 只改「显示」——每个属性在物品 lore 上长什么样。改完 /qcl reload，再 /qi refresh 重渲物品。
# 功能（加属性 / 大类 / 伤害类型 / JS钩子）在上一层 ../attributes.yml；这里只管外观。
#
# 【多语言加载顺序】（后者覆盖前者，逐字段合并）：
#   1) 本文件 lang/attributes.yml          —— 跨语言基准层（本层）
#   2) lang/en_US/attributes.yml           —— 英文回退
#   3) lang/<当前语言>/attributes.yml       —— config.yml 的 language 选定的语言
#
#   · display_name（显示名）：各语言文件里已按语言翻好，会盖掉本文件 → 本文件的显示名仅作兜底。
#   · prefix / suffix：本文件设一次，所有语言通用（除非某语言文件单独覆盖）。
#     → 想给属性加资源包贴图图标：在本文件对应属性的 prefix 写一次，全语言生效，最省事。
#
# 每个属性一块，三个字段：
#   display_name : 显示名（多语言译文在 lang/<语言>/attributes.yml；本层为兜底）
#   prefix       : 名称前（放资源包 16px 贴图字符 / 符号 / 颜色，如 "<gray>⚔ "）—— 跨语言通用
#   suffix       : 数值后（单位，如 "%"）—— 跨语言通用
# 中文字段别名也认：显示名 / 前缀 / 后缀
#
# 渲染格式：  {prefix}{display_name}: {±数值}{suffix}
#   例：prefix="⚔ "  display_name="物理暴击率"  suffix="%"   →   ⚔ 物理暴击率: +20%
#
# ★ 后缀含 % 时，数值自动 ×100（暴击率存的是 0.2 → 显示 20%），不用自己换算。
# ★ 不在任何层配置的属性 → 用代码内置显示名 + 默认样式渲染（不会报错）。
# ============================================================

